name: Auto Merge PR (develop → main)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions: {}

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for new commits on develop
        id: check
        run: |
          git fetch origin main develop --depth=100
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            echo "has_commits=true" >> $GITHUB_OUTPUT
            echo "Found $COUNT new commits on develop."
          else
            echo "has_commits=false" >> $GITHUB_OUTPUT
            echo "No new commits on develop."
          fi

      - name: Setup SSH signing
        if: steps.check.outputs.has_commits == 'true'
        env:
          SSH_KEY: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "BOT_SSH_PRIVATE_KEY is not set, cannot sign commits."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/id_ed25519.pub
          git config commit.gpgsign true
          git config user.name "mendsec"
          git config user.email "fabiomendesilva@gmail.com"
          echo "SSH signing configured."

      - name: Create signed branch
        if: steps.check.outputs.has_commits == 'true'
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git checkout -B develop-signed origin/develop
          git filter-branch -f \
            --env-filter 'export GIT_COMMITTER_NAME="mendsec" GIT_COMMITTER_EMAIL="fabiomendesilva@gmail.com"' \
            --commit-filter 'git commit-tree -S "$@"' \
            origin/main..HEAD
          echo "Signed commits on develop-signed."
          git push origin HEAD:develop-signed --force

      - name: Create Pull Request
        if: steps.check.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop-signed \
            --title "chore: merge develop → main" \
            --body "Automated PR by github-actions[bot]." || \
            echo "PR already exists, skipping."

      - name: Request review and enable auto-merge
        if: steps.check.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head develop-signed --base main --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-reviewer mendsec 2>/dev/null || \
            echo "Could not request review."
            
            # Enforce merge strategy to prevent squash, which causes develop to diverge
            gh pr merge "$PR_NUMBER" --merge --auto 2>/dev/null || \
            echo "Could not enable auto-merge. Ensure 'Allow merge commits' is enabled in repo settings."
            
            echo "PR #$PR_NUMBER updated. Waiting for review from mendsec."
          fi
